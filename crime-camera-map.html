<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0f1e">
  <title>D.C. Crime Cameras</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap');

    :root {
      --bg: #0a0f1e;
      --surface: #0e1628;
      --panel: #111d35;
      --accent: #00e5ff;
      --accent2: #ff3d6b;
      --warn: #ffb700;
      --text: #cfe4ff;
      --muted: #4a6080;
      --border: rgba(0,229,255,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
      flex-shrink: 0;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
    }

    .logo-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: var(--accent);
      letter-spacing: 2px;
    }

    .logo-sub {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: -2px;
    }

    .header-stats {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .stat-pill {
      background: rgba(0,229,255,0.08);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 11px;
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
    }

    .live-dot {
      width: 7px; height: 7px;
      background: #00ff88;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
      display: inline-block;
      margin-right: 5px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    /* MAP — inside main-content flex container */
    #map {
      flex: 1;
      width: 100%;
      z-index: 1;
    }

    /* Leaflet dark tiles override */
    .leaflet-tile-pane { filter: brightness(0.85) saturate(0.7) hue-rotate(180deg); }

    /* FILTER BAR */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      overflow-x: auto;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
    }

    .filter-btn:not(.active):hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* POPUP */
    .leaflet-popup-content-wrapper {
      background: var(--panel) !important;
      border: 1px solid var(--border) !important;
      border-radius: 10px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      color: var(--text) !important;
    }
    .leaflet-popup-tip { background: var(--panel) !important; }
    .leaflet-popup-content { margin: 0 !important; }

    .popup-inner {
      padding: 14px 16px;
      min-width: 200px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .popup-icon {
      font-size: 20px;
    }

    .popup-title {
      font-weight: 700;
      font-size: 14px;
      color: #fff;
    }

    .popup-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 1px;
    }

    .popup-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: var(--text);
    }

    .popup-row:last-child { border-bottom: none; }
    .popup-row span:first-child { color: var(--muted); }

    .popup-badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .badge-d1 { background: rgba(227,38,54,0.15);   color: #e32636; border: 1px solid #e32636; }
    .badge-d2 { background: rgba(253,238,0,0.15);   color: #fdee00; border: 1px solid #fdee00; }
    .badge-d3 { background: rgba(153,102,204,0.15); color: #9966cc; border: 1px solid #9966cc; }
    .badge-d4 { background: rgba(0,72,186,0.15);    color: #0048ba; border: 1px solid #0048ba; }
    .badge-d5 { background: rgba(102,255,0,0.15);   color: #66ff00; border: 1px solid #66ff00; }
    .badge-d6 { background: rgba(0,66,37,0.15);     color: #00a85a; border: 1px solid #00a85a; }
    .badge-d7 { background: rgba(255,56,0,0.15);    color: #ff3800; border: 1px solid #ff3800; }

    /* CUSTOM MARKER */
    .cam-marker {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      font-size: 16px;
      border: 2px solid;
      box-shadow: 0 0 12px currentColor;
      background: var(--bg);
    }

    .cam-d1 { border-color: #e32636; color: #e32636; }
    .cam-d2 { border-color: #fdee00; color: #fdee00; }
    .cam-d3 { border-color: #9966cc; color: #9966cc; }
    .cam-d4 { border-color: #0048ba; color: #0048ba; }
    .cam-d5 { border-color: #66ff00; color: #66ff00; }
    .cam-d6 { border-color: #00a85a; color: #00a85a; }
    .cam-d7 { border-color: #ff3800; color: #ff3800; }

    /* SUBSTATION MARKER */
    .substation-marker {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      font-size: 18px;
      border: 2px solid #ffffff;
      box-shadow: 0 0 14px rgba(255,255,255,0.6);
      background: #1a1a2e;
    }
    .district-label {
      background: transparent !important;
      border: none !important;
      box-shadow: none !important;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      color: rgba(255,255,255,0.5);
      letter-spacing: 1px;
      text-transform: uppercase;
      pointer-events: none;
    }
    .district-label::before { display: none !important; }

    /* LAYOUT WRAPPER */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 10;
    }

    .sidebar-header {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    .sidebar-search {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-search input {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-size: 12px;
      outline: none;
    }

    .sidebar-search input::placeholder { color: var(--muted); }
    .sidebar-search input:focus { border-color: var(--accent); }

    .sidebar-list {
      overflow-y: auto;
      flex: 1;
      scrollbar-width: thin;
      scrollbar-color: var(--muted) transparent;
    }

    .sidebar-list::-webkit-scrollbar { width: 4px; }
    .sidebar-list::-webkit-scrollbar-track { background: transparent; }
    .sidebar-list::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .sidebar-district-group { margin-bottom: 4px; }

    .sidebar-district-title {
      padding: 6px 14px;
      font-size: 10px;
      font-family: 'Share Tech Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .district-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sidebar-item {
      padding: 8px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sidebar-item:hover { background: rgba(0,229,255,0.05); }
    .sidebar-item.active { background: rgba(0,229,255,0.08); }

    .sidebar-item-icon { font-size: 13px; flex-shrink: 0; }

    .sidebar-item-info { flex: 1; min-width: 0; }

    .sidebar-item-name {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .sidebar-item-id {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }

    /* TOGGLE SIDEBAR BUTTON */
    .sidebar-toggle {
      position: absolute;
      left: 280px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 1000;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: none;
      border-radius: 0 8px 8px 0;
      padding: 14px 6px;
      cursor: pointer;
      color: var(--accent);
      font-size: 14px;
      transition: all 0.3s;
      box-shadow: 3px 0 10px rgba(0,0,0,0.4);
    }
    .sidebar-toggle:hover { background: var(--panel); color: #fff; }
    .sidebar.collapsed { width: 0; overflow: hidden; }
    .sidebar.collapsed ~ .map-wrapper .sidebar-toggle { left: 0; }

    /* MAP container adjusts */
    #map { flex: 1; width: 100%; z-index: 1; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📷</div>
    <div>
      <div class="logo-text">D.C. CRIME CAMERAS</div>
      <div class="logo-sub">Surveillance Network</div>
    </div>
  </div>
  <div class="header-stats">
    <div class="stat-pill" id="total-count">0 Cameras</div>
  </div>
</header>

<div class="main-content">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>📋 Camera List</span>
      <div style="display:flex;align-items:center;gap:8px;">
        <span id="sidebar-count" style="color:var(--muted)">0</span>
        <button onclick="toggleSidebar()" style="background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--accent);cursor:pointer;font-size:11px;padding:2px 7px;" title="Collapse">◀</button>
      </div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="sidebar-search" placeholder="Search locations...">
    </div>
    <div class="sidebar-list" id="sidebar-list"></div>
  </div>
  <div style="position:relative;flex:1;display:flex;flex-direction:column;">
    <button id="sidebar-expand-btn" onclick="toggleSidebar()" style="display:none;position:absolute;top:12px;left:12px;z-index:1000;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--accent);cursor:pointer;font-size:12px;padding:6px 10px;box-shadow:0 2px 8px rgba(0,0,0,0.5);">▶ Show List</button>
    <div id="map"></div>
  </div>
</div>

<div class="filter-bar">

  <button class="filter-btn" style="--dc:#ff3d6b" onclick="filterCameras(this, 'd6')">District 6</button>
  <button class="filter-btn" style="--dc:#ff3800" onclick="filterCameras(this, 'd7')">District 7</button>

</div>

  const map = L.map('map', {
    center: [38.9097273, -77.0321367],
    zoom: 13,
    zoomControl: false
  });

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {

  }).addTo(map);

  L.control.zoom({ position: 'topright' }).addTo(map);

  // ─── MARKERS ────────────────────────────────────────────────────
  let markers = [];
  let currentFilter = 'all';

  function createMarker(cam) {
    const color = districtColors[cam.district] || "#00e5ff";
    const icon = L.divIcon({
      className: '',
      html: `<div class="cam-marker cam-${cam.district}">📷</div>`,
      iconSize: [32, 32],
      iconAnchor: [16, 16],
      popupAnchor: [0, -18]
    });

    const marker = L.marker([cam.lat, cam.lng], { icon });

    marker.bindPopup(`
      <div class="popup-inner">
        <div class="popup-header">
          <span class="popup-icon">📷</span>
          <div>
            <div class="popup-title">${cam.name}</div>
            <div class="popup-id">${cam.id}</div>
          </div>
        </div>
        <div class="popup-row">
          <span>District</span>
          <span class="popup-badge badge-${cam.district}">${districtLabels[cam.district]}</span>
        </div>
        <div style="margin-top:10px;border-radius:6px;overflow:hidden;">
          <img src="https://maps.googleapis.com/maps/api/streetview?size=240x140&location=${cam.lat},${cam.lng}&fov=90&pitch=0&key=AIzaSyBZ-6pObvOotHPVMwdYzbnicUDaiBGhgN4" 
               style="width:100%;display:block;border-radius:6px;" 
               alt="Street View"
               onerror="this.style.display='none'"/>
        </div>
      </div>
    `, { maxWidth: 260 });

    marker.cameraData = cam;
    return marker;
  }

  function renderMarkers(filter) {
    markers.forEach(m => map.removeLayer(m));
    markers = [];

    const filtered = cameras.filter(cam =>
      filter === 'all' ? true : cam.district === filter
    );

    filtered.forEach(cam => {
      const m = createMarker(cam);
      m.addTo(map);
      markers.push(m);
    });
  }

  function filterCameras(btn, filter) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = filter;
    renderMarkers(filter);
    renderSidebar(filter);
  }

  // ─── SIDEBAR ─────────────────────────────────────────────────────
  function renderSidebar(filter) {
    const list = document.getElementById('sidebar-list');
    const search = document.getElementById('sidebar-search').value.toLowerCase();

    const filtered = cameras.filter(cam => {
      const matchesFilter = filter === 'all' ? true : cam.district === filter;
      const matchesSearch = cam.name.toLowerCase().includes(search) || cam.id.toLowerCase().includes(search);
      return matchesFilter && matchesSearch;
    });

    document.getElementById('sidebar-count').textContent = filtered.length;

    // Group by district
    const groups = {};
    filtered.forEach(cam => {
      if (!groups[cam.district]) groups[cam.district] = [];
      groups[cam.district].push(cam);
    });

    list.innerHTML = '';
    Object.keys(groups).sort().forEach(district => {
      const color = districtColors[district] || '#fff';
      const label = districtLabels[district] || district;

      const groupEl = document.createElement('div');
      groupEl.className = 'sidebar-district-group';

      const title = document.createElement('div');
      title.className = 'sidebar-district-title';
      title.innerHTML = `<span class="district-dot" style="background:${color}"></span>${label} — ${groups[district].length} camera${groups[district].length !== 1 ? 's' : ''}`;
      groupEl.appendChild(title);

      groups[district].forEach(cam => {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.innerHTML = `
          <span class="sidebar-item-icon">📷</span>
          <div class="sidebar-item-info">
            <div class="sidebar-item-name" title="${cam.name}">${cam.name}</div>
            <div class="sidebar-item-id">${cam.id}</div>
          </div>
        `;
        item.addEventListener('click', () => {
          map.setView([cam.lat, cam.lng], 17);
          // Open the matching marker popup
          markers.forEach(m => {
            if (m.cameraData && m.cameraData.id === cam.id) {
              m.openPopup();
            }
          });
          document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
          item.classList.add('active');
        });
        groupEl.appendChild(item);
      });

      list.appendChild(groupEl);
    });
  }

  document.getElementById('sidebar-search').addEventListener('input', () => {
    renderSidebar(currentFilter);
  });

  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const expandBtn = document.getElementById('sidebar-expand-btn');
    const collapsed = !sidebar.classList.contains('collapsed');
    sidebar.classList.toggle('collapsed', collapsed);
    expandBtn.style.display = collapsed ? 'block' : 'none';
    setTimeout(() => map.invalidateSize(), 310);
  }

  // ─── STATS ──────────────────────────────────────────────────────

  L.geoJSON(districtGeoJSON, {
    style: feature => {
      const d = feature.properties.DISTRICT;
      const color = mpdToAppColor[d] || "#ffffff";
      return { color, weight: 2.5, opacity: 0.9, fillColor: color, fillOpacity: 0.06 };
    },
    onEachFeature: (feature, layer) => {
      const d = feature.properties.DISTRICT;
      layer.bindTooltip(`<strong>District ${d}</strong>`, {
        permanent: true, direction: 'center', className: 'district-label'
      });
    }
  }).addTo(map);

  // ─── MPDC POLICE SUBSTATIONS ────────────────────────────────────
  const substations = [
    { name: "1st District Substation", lat: 38.8834756, lng: -76.9992718 },
    { name: "2nd District Substation", lat: 38.9348222, lng: -77.0748439 },
    { name: "3rd District Substation", lat: 38.917836,  lng: -77.0380528 },
    { name: "4th District Substation", lat: 38.9325583, lng: -77.0256004 },
    { name: "5th District Substation", lat: 38.9151229, lng: -76.9738238 },
    { name: "6th District Substation", lat: 38.8724028, lng: -76.9687617 },
    { name: "7th District Substation", lat: 38.853398,  lng: -76.9695413 },
  ];

  let substationMarkers = [];
  let substationsVisible = false;

  function buildSubstationLayer() {
    substationMarkers.forEach(m => map.removeLayer(m));
    substationMarkers = [];
    substations.forEach(s => {
      const icon = L.divIcon({
        className: '',
        html: `<div class="substation-marker">🏢</div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18],
        popupAnchor: [0, -20]
      });
      const marker = L.marker([s.lat, s.lng], { icon });
      marker.bindPopup(`
        <div class="popup-inner">
          <div class="popup-header">
            <span class="popup-icon">🏢</span>
            <div>
              <div class="popup-title">${s.name}</div>
              <div class="popup-id">MPDC Substation</div>
            </div>
          </div>
        </div>
      `, { maxWidth: 260 });
      substationMarkers.push(marker);
    });
  }

  function toggleSubstations(btn) {
    substationsVisible = !substationsVisible;
    if (substationsVisible) {
      if (substationMarkers.length === 0) buildSubstationLayer();
      substationMarkers.forEach(m => m.addTo(map));
      btn.classList.add('active');
    } else {
      substationMarkers.forEach(m => map.removeLayer(m));
      btn.classList.remove('active');
    }
  }
  renderMarkers('all');
  renderSidebar('all');
</script>
